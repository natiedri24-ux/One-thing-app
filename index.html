<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>One Thing</title>
<meta name="description" content="A calmer way to get things done. Pick a mode that fits how you feel, and the app meets you there.">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#F4EFE6">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="One Thing">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-512.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F4EFE6;
    --screen-bg: var(--cream);
    --flow-bg: #EFF3EC;
    --drift-bg: #F6EEE3;
    --rescue-bg: #F6EAEC;
    --surface: #FFFFFF;
    --text-primary: #2A2622;
    --text-secondary: #6E665C;
    --flow-accent: #9DBE96;
    --flow-text: #2F4A2C;
    --drift-accent: #D9A879;
    --drift-text: #6B4A2C;
    --rescue-accent: #D99BA3;
    --rescue-text: #6B2F38;
    --accent: var(--flow-accent);
    --accent-text: var(--flow-text);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
  }

  body {
    font-family: 'Lexend', sans-serif;
    background: #D6CFC4;
    color: var(--text-primary);
    line-height: 1.6;
    font-size: 16px;
    height: 100%;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Outer chrome — hidden */
  .proto-header { display: none; }

  /* Centered mobile column — full screen on phone, contained on desktop */
  .phone {
    position: relative;
    width: 100%;
    max-width: 430px;
    height: 100vh;
    height: 100dvh;
    background: var(--cream);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.08), 0 24px 64px rgba(0,0,0,0.2);
  }

  /* Fake chrome hidden */
  .dynamic-island { display: none; }
  .status-bar { display: none; }
  .home-indicator-fade { display: none; }
  .home-indicator { display: none; }

  .screen-stack {
    position: relative;
    flex: 1;
    overflow: hidden;
  }
  .screen {
    position: absolute;
    inset: 0;
    background: var(--screen-bg);
    display: none;
    flex-direction: column;
    padding-top: calc(env(safe-area-inset-top, 0px) + 24px);
    padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 24px);
    padding-left: 24px;
    padding-right: 24px;
    overflow-y: auto;
    animation: fadeIn 0.25s ease;
    transition: background 0.25s ease;
  }
  .screen.active { display: flex; }
  .screen::after {
    content: '';
    display: block;
    flex: none;
    height: 20px;
  }

  /* On real mobile: full bleed, no shadow */
  @media (max-width: 480px) {
    body { background: var(--screen-bg); display: block; }
    .phone { max-width: 100%; box-shadow: none; }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Persistent mini header */
  .mini-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 36px;
    margin: 0 -4px 20px;
    flex-shrink: 0;
  }
  .mini-header-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: rgba(0,0,0,0.04);
    cursor: pointer;
    padding: 0;
  }
  .mini-header-btn:hover { background: rgba(0,0,0,0.08); }
  .mini-header-btn .shape.flow,
  .mini-header-btn .shape.rescue { width: 18px; height: 18px; }
  .mini-header-btn .shape.drift .e1,
  .mini-header-btn .shape.drift .e2 { width: 13px; height: 18px; }
  .mini-header-btn.mode-switch {
    width: auto;
    border-radius: 18px;
    padding: 0 12px 0 10px;
    gap: 6px;
  }
  .mini-header-btn.mode-switch .chevron-down {
    color: var(--text-secondary);
    flex-shrink: 0;
  }

  /* Typography */
  .caption { font-size: 13px; color: var(--text-secondary); }
  .greeting { font-size: 14px; color: var(--text-secondary); margin-bottom: 2px; }
  .heading { font-size: 22px; font-weight: 600; line-height: 1.3; margin-bottom: 8px; }
  .display {
    font-size: 30px;
    font-weight: 700;
    line-height: 1.25;
    letter-spacing: -0.01em;
    margin-bottom: 12px;
  }
  .body-text { font-size: 16px; color: var(--text-primary); }
  .body-secondary { font-size: 16px; color: var(--text-secondary); }
  .body-medium { font-size: 16px; font-weight: 500; }

  /* Layout helpers */
  .section-gap { margin-bottom: 24px; }
  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  /* Home dashboard progress banner */
  .progress-banner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    border-radius: 16px;
    padding: 16px 20px;
    margin-bottom: 24px;
  }
  .progress-banner .progress-label {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 2px;
  }
  .progress-banner .progress-value {
    font-size: 22px;
    font-weight: 700;
  }

  /* Quick add (mode screen) */
  .quick-add-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 0;
  }
  .quick-add-plus {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: var(--surface);
    color: var(--text-secondary);
    font-size: 18px;
    font-weight: 500;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .quick-add-plus:active { transform: scale(0.96); }
  .quick-add-input-row {
    display: flex;
    gap: 8px;
    margin: 8px 0 4px;
  }
  .quick-add-input-row .text-input { flex: 1; height: 44px; }
  .quick-add-input-row .add-btn {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    border: none;
    font-size: 20px;
    font-weight: 500;
    cursor: pointer;
    flex-shrink: 0;
  }

  /* Week strip (Home dashboard) */
  .week-strip {
    display: flex;
    justify-content: space-between;
    gap: 6px;
    margin-bottom: 20px;
  }
  .week-day {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    flex: 1;
  }
  .week-day .dot {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: rgba(0,0,0,0.06);
  }
  .week-day .dot.today-empty {
    background: transparent;
    border: 2px dashed rgba(0,0,0,0.18);
  }
  .week-day .day-label {
    font-size: 11px;
    color: var(--text-secondary);
  }
  .week-day.is-today .day-label {
    color: var(--text-primary);
    font-weight: 600;
  }

  /* Quote card (Home dashboard) */
  .quote-card {
    background: var(--surface);
    border-radius: 16px;
    padding: 16px 18px;
    margin-bottom: 16px;
  }
  .quote-card p {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.55;
  }

  /* Focus support status line */
  .focus-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-secondary);
    margin: 12px 0 0;
  }
  .focus-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  /* Shapes */
  .shape { flex-shrink: 0; }
  .shape.flow { border-radius: 50%; background: var(--flow-accent); }
  .shape.drift { display: flex; }
  .shape.drift .e1, .shape.drift .e2 { border-radius: 50%; background: var(--drift-accent); }
  .shape.drift .e2 { margin-left: -40%; opacity: 0.85; }
  .shape.rescue { border-radius: 50% 50% 50% 16%; background: var(--rescue-accent); }

  /* Cards */
  .card {
    background: var(--surface);
    border-radius: 16px;
    padding: 20px;
  }

  /* Onboarding */
  .onboard-shapes {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin: 32px 0 32px;
  }
  .text-input {
    width: 100%;
    height: 52px;
    border-radius: 12px;
    border: 1.5px solid rgba(0,0,0,0.12);
    background: var(--surface);
    padding: 0 16px;
    font-family: inherit;
    font-size: 16px;
    color: var(--text-primary);
  }
  .text-input:focus {
    outline: none;
    border-color: var(--flow-accent);
  }
  .text-input::placeholder { color: #B5AC9E; }

  /* Buttons */
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 52px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    width: 100%;
    font-family: inherit;
    transition: transform 0.1s ease, opacity 0.15s ease;
    text-decoration: none;
    color: inherit;
  }
  .btn:active { transform: scale(0.98); opacity: 0.9; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn:disabled:active { transform: none; }
  .btn-primary.flow { background: var(--flow-accent); color: var(--flow-text); }
  .btn-primary.drift { background: var(--drift-accent); color: var(--drift-text); }
  .btn-primary.rescue { background: var(--rescue-accent); color: var(--rescue-text); }
  .btn-secondary {
    background: var(--surface);
    color: var(--text-primary);
    border: 1.5px solid rgba(0,0,0,0.08);
  }
  .btn-text {
    background: transparent;
    color: var(--text-secondary);
    font-weight: 500;
    height: auto;
    padding: 8px;
  }

  /* Mode pick cards (check-in) */
  .mode-pick {
    background: var(--surface);
    border-radius: 16px;
    padding: 20px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: border-color 0.15s ease, transform 0.1s ease;
    text-align: left;
    width: 100%;
    font-family: inherit;
  }
  .mode-pick:active { transform: scale(0.98); }
  .mode-pick.selected.flow { border-color: var(--flow-accent); }
  .mode-pick.selected.drift { border-color: var(--drift-accent); }
  .mode-pick.selected.rescue { border-color: var(--rescue-accent); }
  .mode-pick .pick-shape { width: 40px; height: 40px; flex-shrink: 0; }
  .mode-pick .pick-shape.drift .e1, .mode-pick .pick-shape.drift .e2 { width: 28px; height: 38px; }
  .mode-pick .pick-shape.rescue { width: 42px; height: 36px; }
  .mode-pick .pick-headline { font-weight: 500; margin-bottom: 4px; }
  .mode-pick .pick-headline.flow { color: var(--flow-text); }
  .mode-pick .pick-headline.drift { color: var(--drift-text); }
  .mode-pick .pick-headline.rescue { color: var(--rescue-text); }
  .mode-pick .pick-desc { font-size: 14px; color: var(--text-secondary); }

  /* Task rows */
  .task-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 0;
  }
  .task-row .handle {
    color: var(--text-secondary);
    font-size: 14px;
    cursor: grab;
  }
  .task-row .task-text { flex: 1; font-size: 16px; }
  .task-row.done .task-text { text-decoration: line-through; color: var(--text-secondary); }
  .task-row .remove-btn {
    background: none;
    border: none;
    color: var(--text-secondary);
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    padding: 4px;
    font-family: inherit;
  }
  .task-row .check-circle {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1.5px solid rgba(0,0,0,0.18);
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: transparent;
  }
  .task-row.done .check-circle {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--accent-text);
  }
  .divider-line {
    height: 1px;
    background: rgba(0,0,0,0.06);
  }

  /* Task entry */
  .add-task-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .add-task-row .text-input { flex: 1; height: 48px; }
  .add-task-row .add-btn {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    border: none;
    font-size: 22px;
    font-weight: 500;
    cursor: pointer;
    flex-shrink: 0;
  }
  .view-list-toggle {
    background: var(--surface);
    border-radius: 16px;
    padding: 16px 20px;
    margin-top: 16px;
    width: 100%;
    border: none;
    cursor: pointer;
    font-family: inherit;
    text-align: left;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .view-list-toggle .body-medium { color: var(--text-primary); }
  .view-list-toggle .chevron {
    color: var(--text-secondary);
    font-size: 13px;
    transition: transform 0.15s ease;
  }
  .view-list-toggle.expanded .chevron { transform: rotate(180deg); }
  .task-list-card {
    background: var(--surface);
    border-radius: 16px;
    padding: 8px 20px;
    margin-top: 8px;
  }

  /* Pre-session / session */
  .timer-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin: 32px auto;
  }
  .timer-ring {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    border: 10px solid;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    flex-shrink: 0;
  }
  .timer-ring .time { font-size: 40px; font-weight: 600; }
  .timer-ring .time-label { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
  .timer-adjust-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: var(--surface);
    color: var(--text-secondary);
    font-size: 18px;
    font-weight: 500;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .timer-adjust-btn:active { transform: scale(0.94); }
  .timer-adjust-spacer { width: 36px; flex-shrink: 0; }

  /* Completion shape */
  .completion-shape {
    width: 80px;
    height: 80px;
    margin: 24px auto;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .completion-shape svg { position: absolute; }
  .completion-shape .check {
    position: relative;
    z-index: 2;
    font-size: 32px;
  }

  /* Bottom sheet (distraction overlay) */
  .sheet-overlay {
    position: absolute;
    inset: 0;
    background: rgba(42,38,34,0.35);
    display: none;
    align-items: flex-end;
    z-index: 40;
  }
  .sheet-overlay.active { display: flex; animation: fadeIn 0.2s ease; }
  .sheet {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 24px;
    width: 100%;
  }
  .sheet .handle-bar {
    width: 36px;
    height: 4px;
    background: rgba(0,0,0,0.15);
    border-radius: 2px;
    margin: 0 auto 16px;
  }

  /* Footer */
  .screen-footer {
    margin-top: auto;
    padding-top: 24px;
    text-align: center;
  }
  .screen-footer .caption { display: block; }

  /* Nav controls — hidden in clean mode */
  .nav-controls { display: none; }

  /* Recurring badge */
  .recurring-badge {
    display: inline-block;
    margin-left: 8px;
    font-size: 11px;
    color: var(--accent-text);
    background: rgba(0,0,0,0.06);
    border-radius: 999px;
    padding: 1px 7px;
    vertical-align: middle;
    font-weight: 500;
  }

  /* Pill */
  .pill {
    display: inline-flex;
    align-items: center;
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
  }
  .pill.flow { background: rgba(157,190,150,0.25); color: var(--flow-text); }
  .pill.drift { background: rgba(217,168,121,0.25); color: var(--drift-text); }
  .pill.rescue { background: rgba(217,155,163,0.25); color: var(--rescue-text); }

  /* Settings toggles */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0;
  }
  .toggle {
    width: 44px;
    height: 26px;
    border-radius: 999px;
    background: rgba(0,0,0,0.12);
    position: relative;
    cursor: pointer;
    transition: background 0.2s ease;
    flex-shrink: 0;
  }
  .toggle.on { background: var(--accent); }
  .toggle .knob {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #fff;
    transition: left 0.2s ease;
  }
  .toggle.on .knob { left: 21px; }

</style>
</head>
<body>

<div class="proto-header">
  <h1>One Thing</h1>
  <p>Click through the prototype. Use the buttons below the phone to jump to any screen.</p>
</div>

<div class="phone" id="phone">
  <div class="status-bar">
    <span class="status-time" id="status-time">9:41</span>
    <div class="status-icons">
      <svg width="18" height="12" viewBox="0 0 18 12" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="0" y="8" width="3" height="4" rx="0.8" fill="currentColor"/>
        <rect x="4.5" y="5.5" width="3" height="6.5" rx="0.8" fill="currentColor"/>
        <rect x="9" y="3" width="3" height="9" rx="0.8" fill="currentColor"/>
        <rect x="13.5" y="0" width="3" height="12" rx="0.8" fill="currentColor"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M8 12C6.2 12 4.5 11.3 3.2 10.1C2.9 9.8 2.9 9.4 3.2 9.1C4.7 7.7 6.3 7 8 7C9.7 7 11.3 7.7 12.8 9.1C13.1 9.4 13.1 9.8 12.8 10.1C11.5 11.3 9.8 12 8 12Z" fill="currentColor"/>
        <path d="M8 6.2C5.7 6.2 3.5 5.3 1.7 3.6C1.4 3.3 1.4 2.9 1.7 2.6C3.6 0.9 5.7 0 8 0C10.3 0 12.4 0.9 14.3 2.6C14.6 2.9 14.6 3.3 14.3 3.6C12.5 5.3 10.3 6.2 8 6.2Z" fill="currentColor" opacity="0.4"/>
      </svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="0.5" y="0.5" width="20" height="11" rx="2.5" stroke="currentColor" opacity="0.4"/>
        <rect x="2" y="2" width="14" height="8" rx="1.3" fill="currentColor"/>
        <rect x="22" y="4" width="2" height="4" rx="1" fill="currentColor" opacity="0.4"/>
      </svg>
    </div>
  </div>
  <div class="dynamic-island"></div>
  <div class="screen-stack" id="screen-stack">
    <!-- screens injected here -->
  </div>
  <div class="home-indicator-fade"></div>
  <div class="home-indicator"></div>
  <div class="sheet-overlay" id="sheet-overlay">
    <div class="sheet">
      <div class="handle-bar"></div>
      <p class="body-medium" style="margin-bottom: 8px;">Your session is still running</p>
      <p class="body-secondary" style="margin-bottom: 20px;" id="sheet-time">14 minutes left on Draft project proposal</p>
      <button class="btn btn-primary flow" id="sheet-back" style="margin-bottom: 8px;">Back to session</button>
      <button class="btn btn-text" id="sheet-stay" style="width:100%;">Stay here</button>
    </div>
  </div>
</div>

<div class="nav-controls">
  <div class="nav-row" id="mode-row"></div>
  <div class="nav-row" id="screen-row"></div>
  <button class="reset-link" id="reset-btn">Reset to morning check-in</button>
</div>

<script>
// ============================================================
// DATA: per-mode content
// ============================================================
const MODES = {
  flow: {
    name: 'Flow',
    accent: '#9DBE96', text: '#2F4A2C',
    headline: "I've got this. Let's go.",
    desc: 'In-flow, ready to make progress.',
    moodLine: "You're in flow. Let's keep it going.",
    primaryTask: 'Draft project proposal',
    firstStep: 'Open the doc and write the first heading',
    cta: 'Begin · 25 min',
    timerStart: '25:00',
    sessionLabel: '25 minutes',
    completedTime: '22 minutes',
    taskLimit: null,
    entryHeadline: "What's on your plate today?",
    entryDesc: "Add as many or as few as you'd like. You can change this anytime.",
    entryPlaceholder: 'e.g. Draft project proposal',
    sampleTask: 'Draft project proposal',
  },
  drift: {
    name: 'Drift',
    accent: '#D9A879', text: '#6B4A2C',
    headline: "I'm showing up. That counts.",

// PERSISTENCE (localStorage)
// ============================================================
const STORAGE_KEY = 'anchor_v1';

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      userName: state.userName,
      tasks: state.tasks,
      mode: state.mode,
      history: state.history,
    }));
  } catch(e) {}
}

function loadSavedState() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
    if (saved) {
      if (saved.userName) state.userName = saved.userName;
      if (Array.isArray(saved.tasks)) state.tasks = saved.tasks;
      if (saved.mode) state.mode = saved.mode;
      if (Array.isArray(saved.history)) state.history = saved.history;
      // returning user: skip onboarding, go to check-in
      if (state.userName) state.current = 'checkin';
    }
  } catch(e) {}
}

function pickHomeQuote() {
  const pool = QUOTES.general.concat(QUOTES[state.mode] || []);
  return pool[Math.floor(Math.random() * pool.length)];
}

// ============================================================
// SHAPE HELPERS (returns HTML for a mode shape at given size)
// ============================================================
function shapeHTML(mode, size) {
  if (mode === 'flow') {
    return `<div class="shape flow" style="width:${size}px;height:${size}px;"></div>`;
  }
  if (mode === 'drift') {
    const ew = Math.round(size * 0.7), eh = size;
    return `<div class="shape drift"><div class="e1" style="width:${ew}px;height:${eh}px;"></div><div class="e2" style="width:${ew}px;height:${eh}px;"></div></div>`;
  }
  // rescue
  const w = Math.round(size * 1.05), h = Math.round(size * 0.85);
  return `<div class="shape rescue" style="width:${w}px;height:${h}px;"></div>`;
}

    <div class="caption section-gap">Settings</div>
    <h2 class="heading section-gap">Focus support</h2>
    <p class="body-secondary section-gap">Choose which apps to manage during sessions, per mode. Off by default.</p>

    ${['flow','drift','rescue'].map(m => `
      <div class="card section-gap">
        <div class="toggle-row">
          <div>
            <div class="body-medium">${MODES[m].name}</div>
            <div class="caption" style="margin-top:2px;">${settingsDesc(m)}</div>
          </div>
          <div class="toggle ${state['settings_'+m] ? 'on' : ''}" id="toggle-${m}" onclick="toggleSetting('${m}')">
            <div class="knob"></div>
          </div>
        </div>
      </div>
    `).join('')}

    <div class="screen-footer">
      <span class="caption">Apps: Instagram, TikTok</span>
    </div>
  `;
};

function settingsDesc(m) {
  if (m === 'flow') return 'Soft reminder if you open a chosen app';
  if (m === 'drift') return 'Notifications paused during session';
  return 'Chosen apps set aside during session';
}

// --- 8. DISTRACTION IN-FLIGHT (Drift confirmation / Rescue blocked) ---
screens.distraction = () => {
  if (state.mode === 'drift') {
    return `
      ${miniHeader()}
      <div class="caption section-gap">Session start</div>
      <div class="card section-gap" style="margin-top:32px;">
        <p class="body-text">Instagram and TikTok are paused for 5 min.</p>
        <p class="body-secondary" style="margin-top:8px;">Everything's still there when you're done.</p>
      </div>
      <div class="screen-footer">
        <button class="btn btn-primary drift" onclick="go('modescreen')">Got it</button>
      </div>
    `;
  }
  if (state.mode === 'rescue') {
    return `
      ${miniHeader()}
      <div class="caption section-gap">Instagram</div>
      <div class="card section-gap" style="margin-top:32px; text-align:center;">
        <p class="body-text">Instagram is set aside for now.</p>
        <p class="body-secondary" style="margin-top:8px;">It'll be here when the session ends.</p>
      </div>
      <div class="screen-footer">
        <button class="btn btn-secondary" onclick="go('modescreen')" style="margin-bottom:12px;">Back to session</button>
        <span class="caption">Hold to end session early &middot; 3 sec, no judgment</span>
      </div>
    `;
  }
  // flow: trigger the bottom sheet instead of a screen
  return `
    <div class="caption section-gap">In progress</div>
    <div class="timer-ring" style="border-color:${MODES.flow.accent};">
      <div class="time">14:02</div>
      <div class="time-label">remaining</div>
    </div>
    <p class="body-medium section-gap" style="text-align:center;">Draft project proposal</p>
    <p class="body-secondary" style="text-align:center;">You opened Instagram. One Thing gently checked in:</p>
    <div class="screen-footer">
      <button class="btn btn-primary flow" onclick="go('inprogress')">Back to session</button>
    </div>
  `;
};

// --- 9. END OF DAY ---
screens.eod = () => {
  const m = MODES[state.mode];
  if (state.mode === 'flow') {
    return `
      ${miniHeader()}
      <div class="caption section-gap">${todayDate()}, Flow</div>
      <h1 class="display">Today's done</h1>
      <div class="card section-gap" style="margin-top:16px;">
        <div class="caption" style="margin-bottom:8px;">TODAY</div>
        <p class="body-text">3 sessions logged &middot; 1h 12m total</p>
      </div>
      <p class="body-secondary section-gap">What felt good today? <span style="text-decoration:underline;">(optional)</span></p>
      <div style="margin-top:auto;">
        <button class="btn btn-primary flow" onclick="go('checkin')" style="margin-bottom:12px;">Done for today</button>
        <span class="caption" style="display:block; text-align:center;">Tomorrow can be a different mode</span>
      </div>
    `;
  }
  if (state.mode === 'drift') {
    return `
      ${miniHeader()}
      <div class="caption section-gap">${todayDate()}, Drift</div>
      <h1 class="display">You showed up</h1>
      <div class="card section-gap" style="margin-top:16px;">
        <div class="caption" style="margin-bottom:8px;">TODAY</div>
        <p class="body-text">1 session logged &middot; 5 min total</p>
      </div>
      <p class="body-secondary section-gap">What did you notice today? <span style="text-decoration:underline;">(optional)</span></p>
      <div style="margin-top:auto;">
        <button class="btn btn-primary drift" onclick="go('checkin')" style="margin-bottom:12px;">Done for today</button>
        <span class="caption" style="display:block; text-align:center;">Tomorrow can be a different mode</span>
      </div>
    `;
  }
  // rescue
  return `
    ${miniHeader()}
    <div class="caption section-gap">${todayDate()}, Rescue</div>
    <h1 class="display">You got through it</h1>
    <div class="card section-gap" style="margin-top:16px;">
      <div class="caption" style="margin-bottom:8px;">TODAY</div>
      <p class="body-text">1 small win logged</p>
    </div>
    <p class="body-secondary section-gap">No question tonight. Just rest.</p>
    <div style="margin-top:auto;">
      <button class="btn btn-primary rescue" onclick="go('checkin')" style="margin-bottom:12px;">Done for today</button>
      <span class="caption" style="display:block; text-align:center;">Nothing carries over as a failure</span>
    </div>
  `;
};

// ============================================================
// HELPERS
// ============================================================
// Formats state.elapsedSeconds as a natural duration string, e.g. "22 minutes" or "1h 8m"
function elapsedLabel() {
  const totalSeconds = state.elapsedSeconds || 0;
  const totalMinutes = Math.max(1, Math.round(totalSeconds / 60));
  if (totalMinutes < 60) {
    return `${totalMinutes} minute${totalMinutes === 1 ? '' : 's'}`;
  }
  const hours = Math.floor(totalMinutes / 60);
  const mins = totalMinutes % 60;
  return mins > 0 ? `${hours}h ${mins}m` : `${hours}h`;
}

function todayDate() {
  const d = new Date();
  return d.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
}

function dateKey(d) {
  return d.toISOString().slice(0, 10);
}

// Records today's mode in history (one entry per day, mode = last picked that day)
function logToday() {
  const key = dateKey(new Date());
  const existing = state.history.find(h => h.date === key);
  if (existing) {
    existing.mode = state.mode;
  } else {
    state.history.push({ date: key, mode: state.mode });
  }
  // keep history bounded, last 30 days is plenty
  if (state.history.length > 30) state.history = state.history.slice(-30);
}

// Builds the last 7 days (oldest to newest, today last) for the week strip
function weekStrip() {
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const key = dateKey(d);
    const entry = state.history.find(h => h.date === key);
    days.push({
      label: d.toLocaleDateString('en-US', { weekday: 'short' }).slice(0, 1),
      isToday: i === 0,
      mode: entry ? entry.mode : null,
    });
  }
  return days;
}

function greetingLine() {
  const hour = new Date().getHours();
  const time = hour < 12 ? 'Morning' : (hour < 18 ? 'Afternoon' : 'Evening');
  const name = state.userName.trim();
  return name ? `${time}, ${name}` : time;
}

function escapeAttr(str) {
  return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;');
}

function escapeHtml(str) {
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// Screens that represent "being inside a mode" get a subtle mode-tinted
// background. Mode-neutral screens (home, checkin, settings, onboarding)
// stay on the plain cream background by design.
const IN_MODE_SCREENS = ['modescreen', 'inprogress', 'stillgoing', 'completion', 'distraction', 'eod'];

function applyAccent() {
  // sync body background so there's no flash on overscroll
  document.body.style.background = 'var(--screen-bg)';
  const m = MODES[state.mode];
  document.documentElement.style.setProperty('--accent', m.accent);
  document.documentElement.style.setProperty('--accent-text', m.text);

  const inMode = IN_MODE_SCREENS.includes(state.current);
  const bgVar = inMode ? `var(--${state.mode}-bg)` : 'var(--cream)';
  document.documentElement.style.setProperty('--screen-bg', bgVar);
}

// ============================================================
// NAVIGATION
// ============================================================
const SCREEN_ORDER = ['welcome','name','checkin','taskentry','home','modescreen','inprogress','stillgoing','distraction','completion','eod','settings','modeswitch'];
const SCREEN_LABELS = {
  welcome: 'Welcome',
  name: 'Name',
  checkin: 'Check-in',
  taskentry: 'Task entry',
  home: 'Home',
  modescreen: 'Mode screen',
  inprogress: 'In progress',
  stillgoing: 'Still going?',
  distraction: 'Distraction',
  completion: 'Completion',
  eod: 'End of day',
  settings: 'Settings',
  modeswitch: 'Mode switch',
};

function go(screenName) {
  clearTimer();
  state.current = screenName;
  state.quickAddOpen = false;
  render();
}

function selectMode(m) {
  state.mode = m;
  applyAccent();
  render();
}

function pickMode(m) {
  state.mode = m;
  applyAccent();
  logToday();
  saveState();
  if (state.tasks.length === 0) {
    go('taskentry');
  } else {
    go('modescreen');
  }
}

function addTask() {
  const input = document.getElementById('task-input');
  if (!input) return;
  const value = input.value.trim();
  if (!value) return;
  const recurringCheck = document.getElementById('recurring-check');
  const recurring = recurringCheck ? recurringCheck.checked : false;
  state.tasks.push({ text: value, done: false, recurring });
  input.value = '';
  if (recurringCheck) recurringCheck.checked = false;
  saveState();
  render();
  const refocus = document.getElementById('task-input');
  if (refocus) refocus.focus();
}

function removeTask(index) {
  state.tasks.splice(index, 1);
  saveState();
  render();
}

function makeUpNext(index) {
  if (index === 0) return; // already up next
  const [task] = state.tasks.splice(index, 1);
  state.tasks.unshift(task);
  saveState();
  render();
}

function toggleTaskDone(index) {
  const task = state.tasks[index];
  if (!task) return;
  state.completedToday++;
  if (task.recurring) {
    // Keep it in the list but move to end so it "resets" for tomorrow
    state.tasks.splice(index, 1);
    state.tasks.push({ text: task.text, done: false, recurring: true });
  } else {
    state.tasks.splice(index, 1);
  }
  saveState();
  render();
}

function toggleTaskList() {
  state.taskListExpanded = !state.taskListExpanded;
  render();
}

function toggleQuickAdd() {
  state.quickAddOpen = !state.quickAddOpen;
  render();
}

function addQuickTask() {
  const input = document.getElementById('quick-add-input');
  if (!input) return;
  const value = input.value.trim();
  if (!value) { state.quickAddOpen = false; render(); return; }
  state.tasks.push({ text: value, done: false, recurring: false });
  state.quickAddOpen = false;
  saveState();
  render();
}

function useSampleTasks() {
  if (state.tasks.length === 0) {
    if (MODES[state.mode].taskLimit === 1) {
      state.tasks = [{ text: MODES[state.mode].sampleTask, done: false }];
    } else {
      state.tasks = DEFAULT_FLOW_TASKS.map(t => ({ text: t, done: false }));
    }
    saveState();
  }
  go('modescreen');
}

function startSession() {
  go('inprogress');
  startTimer();
}

function startTimer() {
  const m = MODES[state.mode];
  const parts = m.timerStart.split(':');
  state.sessionLengthSeconds = parseInt(parts[0]) * 60 + parseInt(parts[1]);
  state.timerSeconds = state.sessionLengthSeconds;
  state.elapsedSeconds = 0;
  state.overtimeCount = 0;
  state.timerMode = 'countdown';
  state.isPaused = false;
  updateTimerDisplay();
  state.timerInterval = setInterval(timerTick, 1000);
}

function timerTick() {
  state.elapsedSeconds++;

  if (state.timerMode === 'countdown') {
    state.timerSeconds--;
    if (state.timerSeconds <= 0) {
      // Time's up, but don't assume the task is done. Flip to counting up,
      // quietly, no interruption. completeCurrentTask() is no longer
      // called automatically here.
      state.timerMode = 'overtime';
      state.timerSeconds = 0;
      updateTimerDisplay();
      return;
    }
    // Show distraction sheet for Flow mode partway through
    if (state.mode === 'flow' && state.settings_flow && state.timerSeconds === Math.floor(state.sessionLengthSeconds * 0.6)) {
      state.distractionBlocks++;
      showSheet();
    }
    // Drift/Rescue: surface the distraction screen partway through, if focus support is on
    if ((state.mode === 'drift' || state.mode === 'rescue') && state['settings_'+state.mode] && state.timerSeconds === Math.floor(state.sessionLengthSeconds * 0.6)) {
      state.distractionBlocks++;
      clearInterval(state.timerInterval);
      state.timerInterval = null;
      go('distraction');
      return;
    }
    updateTimerDisplay();
    return;
  }

  // Overtime: count up silently past the original session length.
  state.timerSeconds++;
  const overtimeNow = Math.floor(state.timerSeconds / state.sessionLengthSeconds);
  if (overtimeNow > state.overtimeCount) {
    state.overtimeCount = overtimeNow;
    if (state.overtimeCount >= 2) {
      // Second full overrun: time for a gentle check-in, not a silent extension.
      clearInterval(state.timerInterval);
      state.timerInterval = null;
      go('stillgoing');
      return;
    }
  }
  updateTimerDisplay();
}

function togglePause() {
  if (state.isPaused) {
    state.isPaused = false;
    state.timerInterval = setInterval(timerTick, 1000);
  } else {
    state.isPaused = true;
    if (state.timerInterval) {
      clearInterval(state.timerInterval);
      state.timerInterval = null;
    }
  }
  render();
}

function adjustTimer(minutesDelta) {
  if (state.timerMode !== 'countdown') return;
  const deltaSeconds = minutesDelta * 60;
  state.timerSeconds = Math.max(5, state.timerSeconds + deltaSeconds);
  state.sessionLengthSeconds = Math.max(5, state.sessionLengthSeconds + deltaSeconds);
  updateTimerDisplay();
}

function clearTimer() {
  if (state.timerInterval) {
    clearInterval(state.timerInterval);
    state.timerInterval = null;
  }
  hideSheet();
}

function updateTimerDisplay() {
  const el = document.getElementById('timer-display');
  const labelEl = document.getElementById('timer-label');
  if (!el) return;
  const mins = Math.floor(state.timerSeconds / 60);
  const secs = state.timerSeconds % 60;
  el.textContent = `${mins}:${secs.toString().padStart(2,'0')}`;
  if (labelEl) labelEl.textContent = state.timerMode === 'overtime' ? 'still going' : 'remaining';
}

function resumeAfterCheckIn() {
  // "Still going" chosen: keep counting up, no further interruptions this session.
  go('inprogress');
  state.timerInterval = setInterval(timerTick, 1000);
}

function showSheet() {
  document.getElementById('sheet-overlay').classList.add('active');
}
function hideSheet() {
  document.getElementById('sheet-overlay').classList.remove('active');
}

function toggleSetting(m) {
  state['settings_'+m] = !state['settings_'+m];
  render();
}

function switchToDrift() {
  state.mode = 'drift';
  applyAccent();
  go('modescreen');
}

function finishOnboarding() {
  const input = document.getElementById('name-input');
  if (input) state.userName = input.value.trim();
  saveState();
  go('checkin');
}

function completeCurrentTask() {
  if (state.tasks.length) {
    const task = state.tasks[0];
    state.lastCompletedTask = task.text;
    state.completedToday++;
    if (task.recurring) {
      state.tasks.shift();
      state.tasks.push({ text: task.text, done: false, recurring: true });
    } else {
      state.tasks.shift();
    }
    saveState();
  }
  go('completion');
}

function resetProto() {
  clearTimer();
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
  state = {
    mode: 'flow',
    current: 'welcome',
    timerInterval: null,
    timerSeconds: 0,
    userName: '',
    tasks: [],
    taskListExpanded: false,
    lastCompletedTask: '',
    completedToday: 0,
    distractionBlocks: 0,
    history: [],
    homeQuote: '',
    quickAddOpen: false,
    sessionLengthSeconds: 0,
    elapsedSeconds: 0,
    overtimeCount: 0,
    timerMode: 'countdown',
    isPaused: false,
  };
  applyAccent();
  render();
}

// ============================================================
// RENDER
// ============================================================
function render() {
  applyAccent();
  const stack = document.getElementById('screen-stack');
  stack.innerHTML = `<div class="screen active">${screens[state.current]()}</div>`;

  if (state.current === 'name') {
    const input = document.getElementById('name-input');
    if (input) {
      input.focus();
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') finishOnboarding();
      });
    }
  }

  if (state.current === 'taskentry' || state.current === 'home') {
    const input = document.getElementById('task-input');
    if (input) {
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') addTask();
      });
    }
  }

  if (state.current === 'modescreen' && state.quickAddOpen) {
    const input = document.getElementById('quick-add-input');
    if (input) {
      input.focus();
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') addQuickTask();
      });
    }
  }

  // mode buttons
  const modeRow = document.getElementById('mode-row');
  modeRow.innerHTML = ['flow','drift','rescue'].map(m =>
    `<button class="nav-btn ${state.mode===m?'active-nav':''}" onclick="selectMode('${m}')">${MODES[m].name}</button>`
  ).join('');

  // screen buttons
  const screenRow = document.getElementById('screen-row');
  screenRow.innerHTML = SCREEN_ORDER.map(s =>
    `<button class="nav-btn ${state.current===s?'active-nav':''}" onclick="go('${s}')">${SCREEN_LABELS[s]}</button>`
  ).join('');
}

// sheet buttons
document.getElementById('sheet-back').addEventListener('click', () => {
  hideSheet();
});
document.getElementById('sheet-stay').addEventListener('click', () => {
  hideSheet();
});
document.getElementById('reset-btn').addEventListener('click', resetProto);

// init
applyAccent();
render();

// PWA: register service worker for offline support + installability
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
